<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading Animation — Indo Route Export</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0A0A0A;
      --font-poppins: 'Poppins', sans-serif;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Outer Loader Container */
    .loading-lines-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 120px;
      width: auto;
      margin: 32px;
      font-family: var(--font-poppins);
      font-size: 1.6em;
      font-weight: 600;
      user-select: none;
      color: white;
      transform: scale(2);
    }

    /* Animated Letters */
    .loading-letter {
      position: relative;
      display: inline-block;
      opacity: 0;
      z-index: 2;
      animation: letterAnim 4s linear infinite;
      color: #CDFF1A; /* brand accent */
    }

    /* Loader Background Overlay */
    .loader-bg-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      background-color: transparent;
      -webkit-mask-image: repeating-linear-gradient(90deg, transparent 0, transparent 6px, #000 7px, #000 8px);
      mask-image: repeating-linear-gradient(90deg, transparent 0, transparent 6px, #000 7px, #000 8px);
    }


    /* Inner Color Grid animating */
    .loader-bg-animated {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 50% 50%, #ff0 0%, transparent 50%),
        radial-gradient(circle at 45% 45%, #f00 0%, transparent 45%),
        radial-gradient(circle at 55% 55%, #0ff 0%, transparent 45%),
        radial-gradient(circle at 45% 55%, #0f0 0%, transparent 45%),
        radial-gradient(circle at 55% 45%, #00f 0%, transparent 45%);
      -webkit-mask-image: radial-gradient(circle at 50% 50%, transparent 0%, transparent 10%, #000 25%);
      mask-image: radial-gradient(circle at 50% 50%, transparent 0%, transparent 10%, #000 25%);
      animation: transformAnim 2s infinite alternate cubic-bezier(0.6, 0.8, 0.5, 1), opacityAnim 4s infinite;
    }

    /* Animations Keyframes */
    @keyframes transformAnim {
      0% {
        transform: translate(-55%);
      }
      100% {
        transform: translate(55%);
      }
    }

    @keyframes opacityAnim {
      0%, 100% {
        opacity: 0;
      }
      15% {
        opacity: 1;
      }
      65% {
        opacity: 0;
      }
    }

    @keyframes letterAnim {
      0% {
        opacity: 0;
      }
      5% {
        opacity: 1;
        text-shadow: 0 0 8px #CDFF1A; /* brand accent */
        transform: scale(1.1) translateY(-2px);
      }
      20% {
        opacity: 0.2;
      }
      100% {
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="loading-lines-container">
    <!-- Animated Masked Color Gradients shifted to be first for stacking context -->
    <div class="loader-bg-container">
      <div class="loader-bg-animated"></div>
    </div>

    <!-- Letters with incremental animation delays -->
    <span class="loading-letter" style="animation-delay: 0.1s;">L</span>
    <span class="loading-letter" style="animation-delay: 0.205s;">o</span>
    <span class="loading-letter" style="animation-delay: 0.31s;">a</span>
    <span class="loading-letter" style="animation-delay: 0.415s;">d</span>
    <span class="loading-letter" style="animation-delay: 0.52s;">i</span>
    <span class="loading-letter" style="animation-delay: 0.625s;">n</span>
    <span class="loading-letter" style="animation-delay: 0.73s;">g</span>
  </div>


</body>
</html>
